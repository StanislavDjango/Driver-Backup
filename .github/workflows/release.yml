name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive build version
        shell: pwsh
        run: |
          $refName = $env:GITHUB_REF_NAME
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $refName -match '^v(?<version>\d+\.\d+\.\d+)$') {
            $version = "$($Matches.version).0"
            $assetVersion = $refName
          }
          else {
            $version = "0.0.0.$env:GITHUB_RUN_NUMBER"
            $assetVersion = "ci-$env:GITHUB_RUN_NUMBER"
          }

          "DRIVERVAULT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DRIVERVAULT_ASSET_VERSION=$assetVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DRIVERVAULT_SEMVER=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Build version: $version"

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path . -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) > $null
            foreach ($parseError in @($parseErrors)) {
              $errors += "{0}:{1}: {2}" -f $_.FullName, $parseError.Extent.StartLineNumber, $parseError.Message
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -RequiredVersion 5.7.1

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Invoke-Pester -Path .\tests -CI

      - name: Install PS2EXE
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber -RequiredVersion 1.0.17

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build DriverVault.exe
        shell: pwsh
        run: |
          .\Build-DriverVaultExe.ps1 -OutputPath .\dist\DriverVault.exe -Version $env:DRIVERVAULT_VERSION -SkipInstall

      - name: Build DriverVaultSetup.exe
        shell: pwsh
        run: |
          .\Build-DriverVaultInstaller.ps1 -Version $env:DRIVERVAULT_SEMVER

      - name: Create release files
        shell: pwsh
        run: |
          $portableHash = (Get-FileHash .\dist\DriverVault.exe -Algorithm SHA256).Hash
          $setupHash = (Get-FileHash .\dist\DriverVaultSetup.exe -Algorithm SHA256).Hash
          Set-Content -LiteralPath .\dist\DriverVault.exe.sha256 -Encoding ASCII -Value "$portableHash  DriverVault.exe"
          Set-Content -LiteralPath .\dist\DriverVaultSetup.exe.sha256 -Encoding ASCII -Value "$setupHash  DriverVaultSetup.exe"

          $zipPath = ".\dist\DriverVault-$env:DRIVERVAULT_ASSET_VERSION.zip"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -LiteralPath .\dist\DriverVaultSetup.exe, .\dist\DriverVaultSetup.exe.sha256, .\dist\DriverVault.exe, .\dist\DriverVault.exe.sha256, .\README.md, .\LICENSE -DestinationPath $zipPath

          "DRIVERVAULT_SHA256=$portableHash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DRIVERVAULT_SETUP_SHA256=$setupHash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Portable SHA256: $portableHash"
          Write-Host "Installer SHA256: $setupHash"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriverVault-${{ env.DRIVERVAULT_ASSET_VERSION }}
          path: |
            dist/DriverVaultSetup.exe
            dist/DriverVaultSetup.exe.sha256
            dist/DriverVault.exe
            dist/DriverVault.exe.sha256
            dist/DriverVault-${{ env.DRIVERVAULT_ASSET_VERSION }}.zip

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $notes = @"
          # DriverVault $tag

          Ready-to-run Windows builds created automatically by GitHub Actions.

          ## Recommended Download

          - Download DriverVaultSetup.exe
          - Run the installer
          - Start DriverVault from the Start Menu
          - Use **Backup** before reinstalling Windows
          - Use **Validate** and then **Restore** after reinstalling Windows

          Portable users can still download DriverVault.exe directly.

          ## Рекомендуемая загрузка

          - Скачайте DriverVaultSetup.exe
          - Запустите установщик
          - Откройте DriverVault из меню Пуск
          - Используйте **Сохранить** перед переустановкой Windows
          - После переустановки нажмите **Проверить**, затем **Восстановить**

          Portable-версия DriverVault.exe тоже доступна отдельно.

          ## SHA256

          DriverVaultSetup.exe: $env:DRIVERVAULT_SETUP_SHA256
          DriverVault.exe: $env:DRIVERVAULT_SHA256
          "@
          Set-Content -LiteralPath release-notes.md -Encoding UTF8 -Value $notes

          $zipPath = "dist/DriverVault-$env:DRIVERVAULT_ASSET_VERSION.zip"
          $assets = @(
            "dist/DriverVaultSetup.exe",
            "dist/DriverVaultSetup.exe.sha256",
            "dist/DriverVault.exe",
            "dist/DriverVault.exe.sha256",
            $zipPath
          )
          if (gh release view $tag *> $null) {
            gh release upload $tag $assets --clobber
          }
          else {
            gh release create $tag $assets --title "DriverVault $tag" --notes-file release-notes.md --latest --verify-tag
          }
